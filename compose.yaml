services:
  postgres:
    image: postgres:15
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - agri_pgdata:/var/lib/postgresql/data
    env_file:
      - .env

  repository:
    build:
      context: ./repository
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - repository/.env
    depends_on:
      postgres:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: wineapp
      RABBITMQ_DEFAULT_PASS: wineapp
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  wine-collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    env_file:
      - collector/.env
    depends_on:
      repository:
        condition: service_started
      rabbitmq:
        condition: service_healthy

volumes:
  agri_pgdata: